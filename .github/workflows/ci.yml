name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ["1.21", "1.22", "1.23"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (library)
        run: go test github.com/nicholashoule/demojify-sanitize -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Test (CLI integration)
        run: go test github.com/nicholashoule/demojify-sanitize/cmd/demojify -v -race

      - name: "CRLF line-ending preservation"
        if: matrix.go-version == '1.23'
        run: go test -v -race -run "TestScanDirPreservesCRLF" github.com/nicholashoule/demojify-sanitize

      - name: "Atomic write and file permissions"
        if: matrix.go-version == '1.23'
        run: go test -v -race -run "TestWriteFinding|TestReplaceFile" github.com/nicholashoule/demojify-sanitize

      - name: "Binary file detection"
        if: matrix.go-version == '1.23'
        run: go test -v -race -run "TestScanDirSkipsBinaryFiles|TestScanDirBinaryNulAfterSniffSizeNotSkipped" github.com/nicholashoule/demojify-sanitize

      - name: "File read protection (chmod)"
        if: matrix.go-version == '1.23'
        run: go test -v -race -run "TestScanDirUnreadableFile" github.com/nicholashoule/demojify-sanitize

      - name: "Symlink handling"
        if: matrix.go-version == '1.23'
        run: go test -v -race -run "TestScanDirSymlink|TestFixDir/rejects_symlink" github.com/nicholashoule/demojify-sanitize

      - name: "Path traversal protection"
        if: matrix.go-version == '1.23'
        run: go test -v -race -run "TestFixDir/does_not_write_outside_root" github.com/nicholashoule/demojify-sanitize

      - name: "ASCII preservation regression"
        if: matrix.go-version == '1.23'
        run: go test -v -race -run "TestReplaceDefaultReplacementsPreservesASCII|TestReplaceLongTokensStillCollapse" github.com/nicholashoule/demojify-sanitize

      - name: Upload coverage
        if: matrix.go-version == '1.23' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23"
          cache: false

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4