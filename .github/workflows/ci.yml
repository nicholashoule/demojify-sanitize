name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ["1.21", "1.22", "1.23"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (library)
        run: go test github.com/nicholashoule/demojify-sanitize -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Test (CLI integration)
        run: go test github.com/nicholashoule/demojify-sanitize/cmd/demojify -v -race

      - name: Upload coverage
        if: matrix.go-version == '1.23' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
